<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Exaviz PoE</title>
<!-- MDI icon font for user-configured device icons (config `devices:`).
     Loaded from CDN; degrades gracefully offline (icons simply absent). -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
<style>
  :root {
    --bg: #14171a; --panel: #1d2126; --border: #2c3238;
    --text: #e8eaed; --dim: #8a9199;
    --green: #7ac142; --green-glow: rgba(122,193,66,.35);
    --white: #dfe3e7; --amber: #e5a50a; --red: #d9534f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; align-items: center; padding: 24px 16px;
  }
  header { width: 100%; max-width: 860px; display: flex; align-items: baseline; gap: 10px; margin-bottom: 18px; }
  #main {
    width: 100%; max-width: 860px; display: flex; gap: 18px;
    align-items: flex-start; justify-content: center;
  }
  #left { display: flex; flex-direction: column; gap: 18px; }
  header h1 { font-size: 18px; font-weight: 600; margin: 0; }
  header .meta { color: var(--dim); font-size: 12px; }
  #conn { margin-left: auto; font-size: 12px; display: flex; align-items: center; gap: 6px; }
  #conn .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  #conn.offline .dot { background: var(--red); }

  .switch-body {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 22px 26px; display: grid; grid-auto-flow: column;
    grid-template-rows: repeat(2, auto); gap: 14px 18px;
  }
  .port { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
  .jack {
    width: 52px; height: 44px; border-radius: 6px;
    border: 2px solid var(--border); background: #23282e;
    display: flex; align-items: center; justify-content: center;
    transition: all .25s; position: relative;
  }
  .jack::after {  /* RJ45 notch */
    content: ""; position: absolute; bottom: -2px; width: 20px; height: 7px;
    background: var(--bg); border: 2px solid var(--border); border-bottom: none;
    border-radius: 3px 3px 0 0;
  }
  .port .label { font-size: 12px; color: var(--dim); }
  .port .dev {  /* connected device hostname/IP under the port */
    font-size: 10px; color: var(--dim); min-height: 13px; max-width: 72px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .port.linked .dev { color: var(--text); }

  /* device drawing PoE power: green bolt + watts inside the jack */
  .jack { flex-direction: column; gap: 1px; }
  .bolt {
    color: var(--green); line-height: 0;
    filter: drop-shadow(0 0 3px var(--green-glow));
  }
  .jwatts { font-size: 9px; font-weight: 600; color: var(--green); line-height: 1; }
  .devicon { font-size: 20px; line-height: 1; color: var(--dim); }
  .port.linked .devicon { color: var(--green); }
  .boltbadge {  /* PoE-drawing badge when a device icon occupies the jack */
    position: absolute; top: -8px; left: -8px; line-height: 0;
    color: var(--green); background: var(--panel);
    border: 1px solid var(--border); border-radius: 50%; padding: 3px;
    filter: drop-shadow(0 0 3px var(--green-glow));
  }
  .port.off .jack { opacity: .8; border-color: #454e57; }
  .port.off .jack::after { border-color: #454e57; }
  .port.off .jack::before {  /* ✕ in the border colour: PoE disabled */
    content: "✕"; font-size: 17px; font-weight: 600; line-height: 1;
    color: #454e57;
  }

  .port.enabled .jack { border-color: var(--white); background: #3a4046; }
  .port.linked .jack {
    border-color: var(--green); background: rgba(122,193,66,.18);
    box-shadow: 0 0 12px var(--green-glow);
  }
  .port.linked .watts { color: var(--green); }
  .port.selected .jack { outline: 2px solid #5ab3f0; outline-offset: 3px; }
  .port.busy .jack { border-color: var(--amber); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: .45; } }

  #detail {
    width: 320px; flex-shrink: 0;
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 22px; display: none;
  }
  #detail.show { display: block; }
  @media (max-width: 720px) {
    #main { flex-direction: column; align-items: center; }
    #detail { width: 100%; max-width: 460px; }
  }
  #detail h2 { margin: 0 0 4px; font-size: 15px; display: flex; align-items: center; gap: 10px; }
  #detail .state-chip {
    font-size: 11px; padding: 2px 9px; border-radius: 10px;
    background: #2c3238; color: var(--dim);
  }
  #detail .state-chip.on { background: rgba(122,193,66,.18); color: var(--green); }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  td { padding: 5px 4px; border-bottom: 1px solid var(--border); }
  td:first-child { color: var(--dim); width: 45%; }
  tr:last-child td { border-bottom: none; }
  #editbtn {
    margin-top: 12px; background: none; border: 1px dashed var(--border);
    color: var(--dim); border-radius: 8px; padding: 6px 12px; font-size: 12px;
    cursor: pointer; width: 100%;
  }
  #editbtn:hover { color: var(--text); border-color: var(--dim); }
  #editform { display: none; margin-top: 12px; }
  #editform.show { display: block; }
  #editform input {
    width: 100%; box-sizing: border-box; margin-bottom: 8px;
    background: #23282e; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 8px 10px; font-size: 13px;
  }
  #editform .iconrow { display: flex; gap: 10px; align-items: center; }
  #editform .iconrow input { flex: 1; margin-bottom: 0; }
  #e-preview { font-size: 22px; color: var(--green); min-width: 26px; text-align: center; }
  #iconpicker {
    margin-top: 8px; max-height: 132px; overflow-y: auto;
    background: #23282e; border: 1px solid var(--border); border-radius: 8px;
    padding: 6px; display: grid;
    grid-template-columns: repeat(auto-fill, minmax(32px, 1fr)); gap: 2px;
  }
  #iconpicker .pick {
    font-size: 18px; color: var(--text); background: none; border: none;
    border-radius: 6px; padding: 5px 0; cursor: pointer; line-height: 1;
  }
  #iconpicker .pick:hover { background: #2c3238; color: var(--green); }
  #iconpicker .pick.sel { color: var(--green); background: #2c3238; }
  #iconpicker .empty { grid-column: 1 / -1; color: var(--dim); font-size: 11px; padding: 6px; }
  .formhint { font-size: 10px; color: var(--dim); margin: 6px 0 8px; }
  .formhint a { color: var(--dim); }
  .formrow { display: flex; gap: 10px; }
  .formrow button {
    flex: 1; padding: 7px 12px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer; color: #14171a;
  }
  #e-save { background: var(--green); }
  #e-cancel { background: #aab2ba; }

  #actions { display: flex; gap: 10px; margin-top: 14px; }
  #actions button {
    flex: 1; padding: 9px 12px; border-radius: 8px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer; color: #14171a;
  }
  #toggle { background: var(--green); }
  #toggle.off { background: var(--red); color: #fff; }
  #reset { background: #5ab3f0; }
  #actions button:disabled { opacity: .5; cursor: wait; }
  #stats {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 26px; display: grid;
    grid-template-columns: repeat(2, 1fr); gap: 18px 16px;
  }
  .stat .k { font-size: 11px; color: var(--dim); white-space: nowrap; }
  .stat .v { font-size: 16px; font-weight: 600; margin-top: 2px; }
  .stat .v small { font-size: 11px; font-weight: 400; color: var(--dim); margin-left: 4px; }

  footer { margin-top: 16px; color: var(--dim); font-size: 11px; }
</style>
</head>
<body>
<header>
  <h1 id="devname">Exaviz PoE</h1>
  <span class="meta" id="devmeta"></span>
  <span id="conn"><span class="dot"></span><span id="conntext">connected</span></span>
</header>

<div id="main">
  <div id="left">
    <div class="switch-body" id="ports"></div>
    <div id="stats"></div>
  </div>

  <div id="detail">
    <h2>
      <span id="d-title"></span>
      <span class="state-chip" id="d-state"></span>
    </h2>
    <table id="d-table"></table>

    <button id="editbtn">✎ Edit device label</button>
    <div id="editform">
      <input id="e-name" placeholder="Name (e.g. Entrance camera)" maxlength="48">
      <div class="iconrow">
        <input id="e-icon" placeholder="mdi:cctv — or type to search icons" maxlength="48">
        <span id="e-preview" class="mdi"></span>
      </div>
      <div id="iconpicker"></div>
      <div class="formhint">Click an icon or type to search the full
        <a href="https://pictogrammers.com/library/mdi/" target="_blank">MDI catalog</a>
        · leave both fields empty to remove</div>
      <div class="formrow">
        <button id="e-save">Save</button>
        <button id="e-cancel">Cancel</button>
      </div>
    </div>

    <div id="actions">
      <button id="toggle"></button>
      <button id="reset">Reset Port</button>
    </div>
  </div>
</div>

<footer id="foot"></footer>

<script>
"use strict";
let state = null;          // last /api/status payload
let selected = null;       // selected port_id
let busy = new Set();      // ports with in-flight commands
let editing = false;       // device-label edit form open

const $ = id => document.getElementById(id);
const fmt = (v, unit, dp=1) => (v === null || v === undefined) ? "—" : `${Number(v).toFixed(dp)} ${unit}`;
const fmtBytes = v => {
  if (v === null || v === undefined) return "—";
  const u = ["B","KB","MB","GB","TB"]; let i = 0;
  while (v >= 1024 && i < u.length-1) { v /= 1024; i++; }
  return `${v.toFixed(i ? 1 : 0)} ${u[i]}`;
};

// Physical layout (back of Cruiser board): P1 P3 P5 P7 / P2 P4 P6 P8.
// The grid uses column flow with 2 rows, so natural port order works.
function renderPorts() {
  const el = $("ports");
  el.innerHTML = "";
  const ids = Object.keys(state.ports).sort(
    (a, b) => parseInt(a.replace("poe","")) - parseInt(b.replace("poe",""))
  );
  for (const id of ids) {
    const p = state.ports[id];
    const num = parseInt(id.replace("poe","")) + 1;
    const linked = p.link_state === "up";
    // A device only counts as PoE-powered when it actually draws power
    // (same 0.5 W threshold as the official HA plugin) — a non-PoE
    // device links up but draws nothing.
    const powered = (p.power_watts ?? 0) >= 0.5;
    // Blink while a command is in flight (local) or awaiting telemetry
    // confirmation from the daemon (p.pending) — covers ON and OFF.
    const working = busy.has(id) || p.pending;
    const div = document.createElement("div");
    div.className = "port"
      + (p.enabled ? " enabled" : " off")
      + (linked && !p.pending ? " linked" : "")
      + (id === selected ? " selected" : "")
      + (working ? " busy" : "");
    const dev = p.connected_device;
    const watts = powered && !p.pending
      ? `<span class="jwatts">${fmt(p.power_watts, "W")}</span>` : "";

    // Jack content: user-configured MDI icon when available, else the
    // bolt for anonymous PoE loads. Nothing while disabled/pending
    // (the ✕ / blink take over).
    let jackContent = "";
    if (p.enabled && !p.pending && dev?.icon && linked) {
      const badge = powered
        ? `<span class="boltbadge"><svg viewBox="0 0 24 24" width="9" height="9">
             <path fill="currentColor" d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/>
           </svg></span>`
        : "";
      jackContent = `${badge}<span class="devicon mdi ${dev.icon.replace("mdi:", "mdi-")}"></span>${watts}`;
    } else if (powered && !p.pending) {
      jackContent = `<span class="bolt"><svg viewBox="0 0 24 24" width="15" height="15">
           <path fill="currentColor" d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/>
         </svg></span>${watts}`;
    }

    const devLabel = (linked && dev)
      ? (dev.custom_name
          || (dev.hostname ? dev.hostname.split(".")[0] : (dev.ip_address || "")))
      : "";
    div.innerHTML = `
      <div class="jack">${jackContent}</div>
      <span class="label">P${num}</span>
      <span class="dev" title="${dev?.ip_address ?? ""}">${devLabel}</span>`;
    div.onclick = () => { selected = (selected === id) ? null : id; editing = false; render(); };
    el.appendChild(div);
  }
}

function renderDetail() {
  const box = $("detail");
  if (!selected || !state.ports[selected]) { box.className = ""; return; }
  const p = state.ports[selected];
  const num = parseInt(selected.replace("poe","")) + 1;
  box.className = "show";
  $("d-title").textContent = `Port ${num} (${selected})`;
  const chip = $("d-state");
  chip.textContent = p.pending ? "applying…" : (p.state ?? "unknown");
  chip.className = "state-chip" + (p.enabled && !p.pending ? " on" : "");

  const dev = p.connected_device;
  const powered = (p.power_watts ?? 0) >= 0.5;
  const plugged = p.link_state === "up" || (p.current_milliamps ?? 0) >= 10;

  // "15.0 W / 15.4 W (Class 3) — 97% utilized", like the official plugin
  let draw = "—";
  if (powered && p.allocated_power_watts) {
    const pct = Math.round(100 * p.power_watts / p.allocated_power_watts);
    draw = `${fmt(p.power_watts, "W")} / ${fmt(p.allocated_power_watts, "W")}`
         + ` (Class ${p.class ?? "?"}) — ${pct}% utilized`;
  }

  const rows = [
    ["Power draw", draw],
    ["Enabled", p.enabled ? "Yes" : "No"],
    ["Device plugged", plugged ? "Yes" : "No"],
    ["Device powered", powered ? "⚡ Yes" : "No"],
    ["Voltage", fmt(p.voltage_volts, "V")],
    ["Current", fmt(p.current_milliamps, "mA", 0)],
    ["Temperature", fmt(p.temperature_celsius, "°C")],
    ["Link", p.link_state ?? "—"],
    ["Speed", p.speed_mbps ? `${p.speed_mbps} Mbps` : "—"],
    ["Traffic RX / TX", `${fmtBytes(p.rx_bytes)} / ${fmtBytes(p.tx_bytes)}`],
  ];
  if (dev?.custom_name) {
    const icon = dev.icon
      ? `<span class="mdi ${dev.icon.replace("mdi:", "mdi-")}"></span> ` : "";
    rows.push(["Device", `${icon}${dev.custom_name}`]);
  }
  if (dev?.manufacturer) rows.push(["Manufacturer", dev.manufacturer]);
  if (dev?.hostname) rows.push(["Hostname", dev.hostname]);
  rows.push(["IP address", dev?.ip_address ?? "—"]);
  rows.push(["MAC address", dev?.mac_address ?? "—"]);
  $("d-table").innerHTML = rows
    .map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("");

  const btn = $("toggle");
  const working = busy.has(selected) || p.pending;
  btn.disabled = working;
  btn.textContent = working
    ? (p.enabled ? "Enabling…" : "Disabling…")
    : (p.enabled ? "Disable Port" : "Enable Port");
  btn.className = p.enabled ? "off" : "";
  btn.onclick = () => togglePort(selected, !p.enabled);

  const rst = $("reset");
  rst.disabled = working || !p.enabled;
  rst.textContent = working ? "Working…" : "Reset Port";
  rst.onclick = () => resetPort(selected);

  // Device label editing — only when we know the device's MAC. The
  // label is keyed by MAC, so it follows the device across ports.
  const hasMac = Boolean(dev?.mac_address);
  $("editbtn").style.display = hasMac && !editing ? "" : "none";
  $("editform").className = hasMac && editing ? "show" : "";
}

function fmtUptime(s) {
  if (s === null || s === undefined) return "—";
  const d = Math.floor(s / 86400), h = Math.floor(s % 86400 / 3600), m = Math.floor(s % 3600 / 60);
  if (d) return `${d}d ${h}h`;
  if (h) return `${h}h ${m}m`;
  return `${m}m`;
}

function renderStats() {
  const ports = Object.values(state.ports);
  const enabled = ports.filter(p => p.enabled).length;
  const poeActive = ports.filter(p => (p.power_watts ?? 0) >= 0.5).length;
  const linked = ports.filter(p => p.link_state === "up").length;
  const watts = ports.reduce((s, p) => s + (p.power_watts || 0), 0);
  const temps = ports.map(p => p.temperature_celsius).filter(t => t > 0);
  const up = state.uplink;
  const wifi = state.wifi;

  const stats = [
    ["Enabled", `${enabled} / ${ports.length}`],
    ["Active", `${linked} <small>linked</small> · ${poeActive} <small>PoE</small>`],
    ["Total power", fmt(watts, "W")],
    ["PSE temp (max)", temps.length ? fmt(Math.max(...temps), "°C") : "—"],
    ["WAN IP", up?.ip ? `${up.ip} <small>${up.interface ?? ""}</small>` : "—"],
    ["WiFi IP", wifi?.ip ? `${wifi.ip} <small>${wifi.interface ?? ""}</small>` : "—"],
    ["MQTT", state.mqtt_connected ? "connected" : "disconnected"],
    ["Bridge uptime", fmtUptime(state.uptime_seconds)],
  ];
  $("stats").innerHTML = stats
    .map(([k, v]) => `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`)
    .join("");
}

function render() {
  if (!state) return;
  $("devname").textContent = state.device.name;
  $("devmeta").textContent = `${state.device.model} · ${state.device.board_type}`;
  $("foot").textContent =
    `exaviz-poe-mqtt-bridge ${state.device.version} · updated ` +
    (state.updated_at ? new Date(state.updated_at * 1000).toLocaleTimeString() : "never");
  renderPorts();
  renderStats();
  renderDetail();
}

async function togglePort(id, on) {
  if (!on && state.ports[id]?.link_state === "up"
      && !confirm(`Port ${parseInt(id.replace("poe","")) + 1} has an active link. Cut PoE power?`)) return;
  busy.add(id); render();
  try {
    const r = await fetch(`/api/ports/${id}/power`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ on }),
    });
    if (!r.ok) alert((await r.json()).error ?? `HTTP ${r.status}`);
  } catch (e) {
    alert(`Request failed: ${e}`);
  } finally {
    busy.delete(id);
    await refresh();
  }
}

// Icon picker: curated PoE-relevant set shown by default; typing in the
// icon field searches the full MDI catalog (meta.json fetched lazily
// from the same CDN as the font; falls back to the curated set offline).
const CURATED_ICONS = [
  "cctv", "camera", "video", "doorbell-video", "webcam",
  "access-point", "router-wireless", "router-network", "wifi", "antenna",
  "phone-voip", "deskphone", "printer", "laptop", "desktop-tower",
  "monitor", "television", "server", "server-network", "nas",
  "raspberry-pi", "chip", "lightbulb", "led-strip-variant", "speaker",
  "cast", "tablet", "cellphone", "thermostat", "motion-sensor",
  "smoke-detector", "lock-smart", "garage", "solar-power", "ev-station",
  "robot-vacuum", "alarm-light", "audio-video", "gamepad-variant", "lan",
];
let mdiCatalog = null;   // [{name, search}] or null while not loaded
let pickerTimer = null;

async function loadMdiCatalog() {
  if (mdiCatalog) return mdiCatalog;
  try {
    const r = await fetch("https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/meta.json");
    mdiCatalog = (await r.json()).map(i => ({
      name: i.name,
      search: [i.name, ...(i.aliases ?? []), ...(i.tags ?? [])].join(" ").toLowerCase(),
    }));
  } catch { /* offline: curated set still works */ }
  return mdiCatalog;
}

function renderPicker(names) {
  const current = $("e-icon").value.trim().replace(/^mdi:/, "");
  $("iconpicker").innerHTML = names.length
    ? names.slice(0, 80).map(n =>
        `<button class="pick mdi mdi-${n}${n === current ? " sel" : ""}"
                 title="${n}" onclick="pickIcon('${n}')"></button>`).join("")
    : '<div class="empty">No icons match — check the MDI catalog link below</div>';
}

function pickIcon(name) {
  $("e-icon").value = `mdi:${name}`;
  updateIconPreview();
  renderPicker([name]);
}

async function updatePicker() {
  const q = $("e-icon").value.trim().replace(/^mdi:/, "").toLowerCase();
  if (!q) { renderPicker(CURATED_ICONS); return; }
  const catalog = await loadMdiCatalog();
  renderPicker(catalog
    ? catalog.filter(i => i.search.includes(q)).map(i => i.name)
    : CURATED_ICONS.filter(n => n.includes(q)));
}

function openEdit() {
  const dev = state.ports[selected]?.connected_device;
  if (!dev?.mac_address) return;
  $("e-name").value = dev.custom_name ?? "";
  $("e-icon").value = dev.icon ?? "";
  updateIconPreview();
  updatePicker();
  loadMdiCatalog();  // warm the catalog while the user types the name
  editing = true;
  render();
  $("e-name").focus();
}

function updateIconPreview() {
  const icon = $("e-icon").value.trim();
  $("e-preview").className =
    /^mdi:[a-z0-9-]+$/.test(icon) ? `mdi ${icon.replace("mdi:", "mdi-")}` : "mdi";
}

async function saveLabel() {
  const mac = state.ports[selected]?.connected_device?.mac_address;
  if (!mac) return;
  try {
    const r = await fetch(`/api/devices/${mac}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: $("e-name").value.trim(),
        icon: $("e-icon").value.trim(),
      }),
    });
    if (!r.ok) { alert((await r.json()).error ?? `HTTP ${r.status}`); return; }
    editing = false;
    await refresh();
  } catch (e) {
    alert(`Request failed: ${e}`);
  }
}

$("editbtn").onclick = openEdit;
$("e-cancel").onclick = () => { editing = false; render(); };
$("e-save").onclick = saveLabel;
$("e-icon").oninput = () => {
  updateIconPreview();
  clearTimeout(pickerTimer);
  pickerTimer = setTimeout(updatePicker, 200);  // debounce catalog search
};

async function resetPort(id) {
  const num = parseInt(id.replace("poe", "")) + 1;
  if (!confirm(`Power-cycle port ${num}? The connected device will reboot.`)) return;
  busy.add(id); render();
  try {
    const r = await fetch(`/api/ports/${id}/reset`, { method: "POST" });
    if (!r.ok) alert((await r.json()).error ?? `HTTP ${r.status}`);
  } catch (e) {
    alert(`Request failed: ${e}`);
  } finally {
    busy.delete(id);
    await refresh();
  }
}

async function refresh() {
  try {
    const r = await fetch("/api/status");
    state = await r.json();
    $("conn").className = ""; $("conntext").textContent = "connected";
  } catch {
    $("conn").className = "offline"; $("conntext").textContent = "offline";
  }
  render();
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
